name: Data freshness check

on:
  schedule:
    - cron: '0 6 * * 2'  # Every Tuesday at 06:00 UTC (09:00 Helsinki)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check lastUpdated fields
        id: check
        run: |
          CUTOFF=$(date -d '8 days ago' +%Y-%m-%d)
          LATEST=$(jq -r '[.[] | .lastUpdated] | sort | last' src/data/models.json)
          echo "cutoff=$CUTOFF" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [[ "$LATEST" < "$CUTOFF" ]]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue if stale
        if: steps.check.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['data-stale'],
              state: 'open',
            });
            if (existing.data.length > 0) {
              console.log('Issue already open, skipping');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Viikoittainen datapäivitys epäonnistui',
              body: `Datan viimeisin päivityspäivä on \`${{ steps.check.outputs.latest }}\`, joka on yli 8 päivää sitten.\n\nCCR-rutiini saattaa olla jumissa. Tarkista: https://claude.ai/code/routines/trig_013Fjh4fi8bR7wNbk8mHkVvp`,
              labels: ['data-stale'],
            });
