name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate data
        run: npm run validate

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Tests
        run: npm run test:run

      - name: Build
        run: npm run build
